name: Python debug check

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo tree
        run: |
          pwd
          find . -maxdepth 3 -type f | sort

      - name: Show target file around suspected area
        run: |
          nl -ba ppa_dashboard/app.py | sed -n '450,490p'

      - name: Compile target file
        run: python -m py_compile ppa_dashboard/app.py
