# .github/workflows/update_xborder.yml
name: Update Cross-Border DA & FCR Prices

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'full or incremental'
        required: false
        default: 'incremental'
      dataset:
        description: 'all, da-only, or fcr-only'
        required: false
        default: 'all'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-xborder:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas entsoe-py

      - name: Run update
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.mode }}" = "full" ]; then ARGS="--full"; fi
          if [ "${{ github.event.inputs.dataset }}" = "da-only" ];  then ARGS="$ARGS --da-only";  fi
          if [ "${{ github.event.inputs.dataset }}" = "fcr-only" ]; then ARGS="$ARGS --fcr-only"; fi
          python ppa_dashboard/update_entsoe_xborder.py $ARGS

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ppa_dashboard/data/
          git diff --staged --quiet || git commit -m "Auto-update xborder DA + FCR $(date -u '+%Y-%m-%d')"
          git push
