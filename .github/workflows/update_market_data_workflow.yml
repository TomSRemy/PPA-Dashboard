# .github/workflows/update_market_data.yml
name: Update Market Data (TTF / Brent / EUA)

on:
  schedule:
    - cron: '15 8 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'full = backfill from 2018, incremental = last 14 days'
        required: false
        default: 'incremental'

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests yfinance

      - name: Run update
        run: |
          if [ "${{ github.event.inputs.mode }}" = "full" ]; then
            python ppa_dashboard/scripts/update_market_data.py --full
          else
            python ppa_dashboard/scripts/update_market_data.py
          fi

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ppa_dashboard/data/market_prices.csv || true
          git diff --cached --quiet || git commit -m "chore: update market prices (TTF/Brent/EUA) $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push || true
