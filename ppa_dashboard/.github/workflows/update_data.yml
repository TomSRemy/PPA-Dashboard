name: Update ENTSO-E Data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install entsoe-py pandas requests

      - name: Run data update
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
        run: python scripts/update_entsoe.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hourly_spot.csv data/nat_reference.csv data/last_update.txt
          git diff --staged --quiet || git commit -m "Auto-update ENTSO-E data $(date -u '+%Y-%m-%d')"
          git push
